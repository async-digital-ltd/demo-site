<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Async Digital — Demos</title>
  <meta name="description" content="Live product demos from Async Digital." />
  <style>
    :root {
      --text: #0b0b0c;
      --muted: #5a5f69;
      --bg: #ffffff;
      --border: rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 480px; }
    h1 { font-size: 24px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p { color: var(--muted); margin: 0 0 32px; font-size: 16px; line-height: 1.55; }
    .demos { list-style: none; padding: 0; margin: 0; }
    .demos li { margin-bottom: 12px; }
    .demos a {
      display: block;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 15px;
      transition: background 120ms ease, box-shadow 120ms ease;
    }
    .demos a:hover {
      background: #f6f7f9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .demos a:focus-visible {
      outline: 3px solid rgba(10,165,255,0.35);
      outline-offset: 3px;
    }
    .back {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }
    .back a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }
    .back a:hover { border-bottom-color: rgba(0,0,0,0.18); }
    .legal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demos</h1>
    <p>Live product demos from Async Digital.</p>
    <ul class="demos">
      <li><a href="/speed-to-lead/">Speed to Lead — Missed-call follow-up</a></li>
    </ul>
    <div class="back"><a href="https://async-digital.com">← async-digital.com</a></div>
  </div>
  <div class="legal" role="contentinfo">
    &copy; <span id="year"></span> Async Digital Ltd &middot; Registered in England &amp; Wales, Co. No. 16950485 &middot; Registered office: 167&ndash;169 Great Portland Street, London, W1W 5PF
  </div>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
