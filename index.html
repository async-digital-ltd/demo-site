<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Async Digital — Demos</title>
  <meta name="description" content="Live product demos from Async Digital." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Async Digital" />
  <meta property="og:title" content="Async Digital — Demos" />
  <meta property="og:description" content="Live product demos from Async Digital." />
  <meta property="og:image" content="https://async-digital.com/assets/og-logo.jpg" />
  <meta property="og:url" content="https://demo.async-digital.com/" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Async Digital — Demos" />
  <meta name="twitter:description" content="Live product demos from Async Digital." />
  <meta name="twitter:image" content="https://async-digital.com/assets/og-logo.jpg" />

  <link rel="icon" type="image/png" sizes="32x32" href="https://async-digital.com/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="https://async-digital.com/assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://async-digital.com/assets/apple-touch-icon.png" />

  <style>
    :root {
      --text: #0b0b0c;
      --muted: #5a5f69;
      --bg: #ffffff;
      --border: rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container { text-align: center; max-width: 480px; }
    h1 { font-size: 24px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    p { color: var(--muted); margin: 0 0 32px; font-size: 16px; line-height: 1.55; }
    .demos { list-style: none; padding: 0; margin: 0; }
    .demos li { margin-bottom: 12px; }
    .demos a {
      display: block;
      padding: 14px 20px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 500;
      font-size: 15px;
      transition: background 120ms ease, box-shadow 120ms ease;
    }
    .demos a:hover {
      background: #f6f7f9;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .demos a:focus-visible {
      outline: 3px solid rgba(10,165,255,0.35);
      outline-offset: 3px;
    }
    .back {
      margin-top: 28px;
      font-size: 14px;
      color: var(--muted);
    }
    .back a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }
    .back a:hover { border-bottom-color: rgba(0,0,0,0.18); }
    .legal {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px 12px;
      text-align: center;
      color: var(--muted);
      line-height: 1.4;
    }
    .legal-primary {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px 10px;
      font-size: 12px;
      color: var(--text);
    }
    .legal-fine {
      margin-top: 3px;
      font-size: 11px;
    }
    .legal-sep { color: var(--border); }
    .legal-nowrap { white-space: nowrap; }
    .legal a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
    }
    .legal a:hover { border-bottom-color: rgba(0,0,0,0.18); }
  </style>
  <script src="https://async-digital.com/assets/brand.js?v=2026-04-17" defer></script>
</head>
<body>
  <div class="container">
    <h1>Demos</h1>
    <p>Live product demos from Async Digital.</p>
    <ul class="demos">
      <li><a href="/speed-to-lead/">Speed to Lead — Missed-call follow-up</a></li>
    </ul>
    <div class="back"><a href="https://async-digital.com">← async-digital.com</a></div>
  </div>
  <div class="legal" role="contentinfo">
    <div class="legal-primary">
      <span>&copy; <span id="year"></span> Async Digital Ltd</span>
      <span class="legal-sep" aria-hidden="true">&middot;</span>
      <a data-brand-mailto href="mailto:h.nash1@async-digital.com">Contact</a>
    </div>
    <div class="legal-fine">
      Registered in England &amp; Wales
      <span class="legal-sep" aria-hidden="true">&middot;</span>
      <span class="legal-nowrap">Co. No. 16950485</span>
      <span class="legal-sep" aria-hidden="true">&middot;</span>
      167&ndash;169 Great Portland Street, London,
      <span class="legal-nowrap">W1W 5PF</span>
    </div>
  </div>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
